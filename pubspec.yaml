name: leo_workstation
description: Flutter client for the Leo interpreting platform.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_secure_storage: ^10.3.1
  url_launcher: ^6.3.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2
  crypto: ^3.0.6
  qr_flutter: ^4.1.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - .env
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Variable.ttf
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Variable.ttf
    - family: DM Mono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500

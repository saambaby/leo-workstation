apiVersion: pineapple/v1
kind: TaskGraph
metadata:
  project: leo-workstation
  phase: v0.0.1-alpha.1
  status: shipped
  created: 2026-06-29
  revised: 2026-07-11

waves:
  - id: W1
    name: "Foundation"
    gate: manual
  - id: W2
    name: "Shell chrome + auth core"
    gate: manual
  - id: W3
    name: "Auth screens + router"
    gate: auto

tasks:
  - id: P1-T-01
    issue: 2
    title: "core-shell Foundation: bootstrap, config, dio + Bearer seam + cert-pin, token storage, DeviceClass, theme"
    wave: W1
    feature_spec: .pineapple/features/core-shell.md
    area: core
    surface: frontend
    model: high
    depends_on: []
    verification: auto
    human_admin: false
    acceptance_criteria:
      - "main() wraps the app in ProviderScope; LeoApp builds CupertinoApp.router; flutter analyze clean; app boots."
      - "appConfigProvider exposes apiBaseUrl/realtimeWsUrl/webAdminBaseUrl from .env (flutter_dotenv)."
      - "dioProvider baseUrl from config; interceptor injects Authorization: Bearer <token> from currentAccessTokenProvider when non-null, omits when null."
      - "badCertificateCallback returns true only on SHA-256 pin match (rotation list); debug bypass gated to kDebugMode when no pins configured (INV-CLIENT-NET-1)."
      - "currentAccessTokenProvider defined here (in-memory, default null); core-shell never writes it (INV-CLIENT-AUTH-4)."
      - "tokenStorageProvider reads/writes/clears the refresh token in flutter_secure_storage only (INV-CLIENT-AUTH-1, -PHI-1)."
      - "deviceClassProvider derives {desktop,tablet,smartphone} from MediaQuery (INV-CLIENT-DEVICE-1)."
      - "app_theme provides light/dark/night CupertinoThemeData; dark default; brightness persisted (INV-CLIENT-UI-1)."

  - id: P1-T-02
    issue: 3
    title: "Shell chrome: WorkstationScaffold (header + rail slots + tenant-chip/avatar mount + lsp_admin admin-link)"
    wave: W2
    feature_spec: .pineapple/features/core-shell.md
    area: core/shell
    surface: frontend
    model: standard
    depends_on: [P1-T-01]
    verification: auto
    human_admin: false
    acceptance_criteria:
      - "WorkstationScaffold renders header (tenant-chip slot + avatar mount) + rail slots."
      - "Rail-footer Admin dashboard link only for lsp_admin when webAdminBaseUrl is set; opens externally (INV-CLIENT-ROUTE-1)."
      - "Semantics on chrome controls (INV-CLIENT-A11Y-1); copy via intl (INV-CLIENT-I18N-1)."
    notes: "webAdminBaseUrl feeds the lsp_admin chrome external link only — not a platform_admin route."

  - id: P1-T-03
    issue: 4
    title: "auth core: core/auth AuthRepository, AuthState union, AuthNotifier, session restore, token-holder writes"
    wave: W2
    feature_spec: .pineapple/features/auth.md
    area: core/auth + features/auth
    surface: frontend
    model: high
    depends_on: [P1-T-01]
    verification: auto
    human_admin: false
    acceptance_criteria:
      - "AuthState union per INV-CLIENT-STATE-2: unauthenticated(forgotPasswordSending?, resendCodeSending?, emailVerificationPending?) · loading(reason?) · error(message) · mfaRequired(firstLogin, enrollmentToken?, otpauthUrl?, secret?) · authenticated(role, tenantId?, onboardingRequired). No pickMembership arm."
      - "AuthRepository in lib/core/auth/data/ (INV-CLIENT-AUTH-REPO-1); features/auth/data re-exports only."
      - "Login -> LoginResult (session or mfaRequired); MFA enroll via /auth/mfa/enroll; challenge resubmits /auth/login with totp_code."
      - "Login 401 unverified sets emailVerificationPending (router redirect, no push)."
      - "platform_admin session mint rejected in _applySession with error on /login (INV-CLIENT-ROUTE-2)."
      - "0-membership interpreter -> tenant-less authenticated -> /idle (INV-CLIENT-AUTH-3)."
      - "Two-step reset: POST /auth/reset-password/verify -> reset_ticket; POST /auth/reset-password {reset_ticket, new_password}."
      - "AuthNotifier sole writer of currentAccessTokenProvider (INV-CLIENT-AUTH-4); build() restores session from secure storage."
    notes: "No listMemberships/switchTenant/selectMembership — cut per auth.md D1/D2."

  - id: P1-T-04
    issue: 5
    title: "auth screens: login, mfa, mfa_enroll, forgot/verify/reset (OTP two-step), invite_accept"
    wave: W3
    feature_spec: .pineapple/features/auth.md
    area: features/auth
    surface: frontend
    model: standard
    depends_on: [P1-T-03, P1-T-02]
    verification: manual
    human_admin: false
    acceptance_criteria:
      - "Cupertino screens: /login, /mfa, /mfa/enroll, /forgot-password, /forgot-password/verify, /reset-password, /invite/accept."
      - "No /select-workspace, tenant_picker, or in-app workspace switcher (auth.md D1/D2)."
      - "/forgot-password uniform response (no enumeration); reset consumes reset_ticket via route extra."
      - "/invite/accept collects tos/privacy/baa_ack consent."
      - "MfaEnrollScreen renders real QR from otpauth_url (qr_flutter)."
    notes: "Manual smoke of login, MFA, forgot/reset OTP, invite."

  - id: P1-T-05
    issue: 6
    title: "router: routerProvider, pure redirect + route_guards, refresh bridge, route tree + device gating"
    wave: W3
    feature_spec: .pineapple/features/router.md
    area: core/router
    surface: frontend
    model: high
    depends_on: [P1-T-03, P1-T-02]
    verification: auto
    human_admin: false
    acceptance_criteria:
      - "redirect pure over (AuthState, DeviceClass, path, extra, queryParameters); refresh via authRefreshListenableProvider."
      - "emailVerificationPending -> /verify-email?... (A1); authenticated on public auth/signup routes -> role home (A2)."
      - "Context guards in redirect.dart + route_guards.dart only (INV-CLIENT-ROUTE-GUARD-1)."
      - "Role->home per INV-CLIENT-ROUTE-2; onboardingRequired -> /onboarding/*; device gating -> /blocked-surface."
      - "No redirect loop — redirect_test.dart loop-safety (router AC-8)."
      - "No /web-handoff route."
    notes: "Onboarding public routes registered; onboarding screens are P2 follow-on."

coordinator:
  max_concurrent: 2
  stuck_threshold_seconds: 5400
  worktree_strategy: per-task
  completion_strategy: review-gate
